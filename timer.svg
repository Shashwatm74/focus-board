<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <style>
      text { font-smoothing: antialiased; }
    </style>
  </defs>
  <rect width="900" height="560" fill="#0d0d0f"/>
  <!-- header -->
  <rect width="900" height="50" fill="#141416" stroke="#2a2a2f" stroke-width="1"/>
  <text x="20" y="32" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#e8d5a3">Focus</text>
  <text x="72" y="32" font-family="Georgia,serif" font-size="18" fill="#9b9893">Board</text>
  <text x="880" y="32" font-family="monospace" font-size="11" fill="#5a5855" text-anchor="end">Fri, Mar 06</text>

  <!-- sidebar -->
  <rect x="0" y="50" width="180" height="510" fill="#141416" stroke="#2a2a2f" stroke-width="1"/>
  <text x="38" y="92" font-family="Georgia,serif" font-size="13" fill="#9b9893" font-weight="normal">Tasks</text>
  <text x="38" y="136" font-family="Georgia,serif" font-size="13" fill="#9b9893" font-weight="normal">Timetable</text>
  <text x="38" y="180" font-family="Georgia,serif" font-size="13" fill="#9b9893" font-weight="normal">Notes</text>
  <rect x="8" y="202" width="164" height="34" rx="8" fill="#1c1c1f" stroke="#3a3a40" stroke-width="1"/>
  <text x="38" y="224" font-family="Georgia,serif" font-size="13" fill="#e8d5a3" font-weight="bold">Focus</text>
  <text x="38" y="268" font-family="Georgia,serif" font-size="13" fill="#9b9893" font-weight="normal">History</text>
  <text x="20" y="546" font-family="monospace" font-size="10" fill="#5a5855">Fri Mar 06</text>
  <rect x="180" y="50" width="720" height="510" fill="#0d0d0f"/>

  <text x="490" y="92" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#f0ede8" text-anchor="middle">Focus</text>

  <!-- mode pills -->
  <rect x="318" y="108" width="80" height="28" rx="14" fill="#e8d5a322" stroke="#e8d5a355" stroke-width="1"/>
  <text x="358" y="126" font-family="monospace" font-size="11" fill="#e8d5a3" text-anchor="middle">Focus</text>
  <rect x="406" y="108" width="100" height="28" rx="14" fill="#1c1c1f"/>
  <text x="456" y="126" font-family="monospace" font-size="11" fill="#5a5855" text-anchor="middle">Short Break</text>
  <rect x="514" y="108" width="96" height="28" rx="14" fill="#1c1c1f"/>
  <text x="562" y="126" font-family="monospace" font-size="11" fill="#5a5855" text-anchor="middle">Long Break</text>

  <!-- ring track -->
  <circle cx="490" cy="310" r="100" fill="none" stroke="#1c1c1f" stroke-width="8"/>
  <!-- ring progress -->
  <path d="M 490.00 210.00 A 100 100 0 0 1 570.90 368.78"
        fill="none" stroke="#e8d5a3" stroke-width="8" stroke-linecap="round"/>

  <!-- time display -->
  <text x="490" y="322" font-family="monospace" font-size="44" font-weight="bold" fill="#e8d5a3" text-anchor="middle">16:15</text>
  <text x="490" y="344" font-family="monospace" font-size="11" fill="#5a5855" text-anchor="middle">Focus</text>

  <!-- reset button -->
  <circle cx="388" cy="450" r="24" fill="#1c1c1f" stroke="#2a2a2f" stroke-width="1"/>
  <text x="388" y="455" font-family="monospace" font-size="14" fill="#9b9893" text-anchor="middle">↺</text>

  <!-- play/pause button -->
  <circle cx="490" cy="450" r="34" fill="#e8d5a3"/>
  <polygon points="480,440 480,460 502,450" fill="#0d0d0f"/>

  <!-- settings button -->
  <circle cx="592" cy="450" r="24" fill="#1c1c1f" stroke="#2a2a2f" stroke-width="1"/>
  <text x="592" y="456" font-family="monospace" font-size="15" fill="#9b9893" text-anchor="middle">⚙</text>

  <!-- session count -->
  <text x="490" y="510" font-family="monospace" font-size="12" fill="#5a5855" text-anchor="middle">Sessions today: <tspan fill="#e8d5a3" font-weight="bold">3</tspan></text>

</svg>
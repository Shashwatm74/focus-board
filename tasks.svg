<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <style>
      text { font-smoothing: antialiased; }
    </style>
  </defs>
  <rect width="900" height="560" fill="#0d0d0f"/>
  <!-- header -->
  <rect width="900" height="50" fill="#141416" stroke="#2a2a2f" stroke-width="1"/>
  <text x="20" y="32" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#e8d5a3">Focus</text>
  <text x="72" y="32" font-family="Georgia,serif" font-size="18" fill="#9b9893">Board</text>
  <text x="880" y="32" font-family="monospace" font-size="11" fill="#5a5855" text-anchor="end">Fri, Mar 06</text>

  <!-- sidebar -->
  <rect x="0" y="50" width="180" height="510" fill="#141416" stroke="#2a2a2f" stroke-width="1"/>
  <rect x="8" y="70" width="164" height="34" rx="8" fill="#1c1c1f" stroke="#3a3a40" stroke-width="1"/>
  <text x="38" y="92" font-family="Georgia,serif" font-size="13" fill="#e8d5a3" font-weight="bold">Tasks</text>
  <text x="38" y="136" font-family="Georgia,serif" font-size="13" fill="#9b9893" font-weight="normal">Timetable</text>
  <text x="38" y="180" font-family="Georgia,serif" font-size="13" fill="#9b9893" font-weight="normal">Notes</text>
  <text x="38" y="224" font-family="Georgia,serif" font-size="13" fill="#9b9893" font-weight="normal">Focus</text>
  <text x="38" y="268" font-family="Georgia,serif" font-size="13" fill="#9b9893" font-weight="normal">History</text>
  <text x="20" y="546" font-family="monospace" font-size="10" fill="#5a5855">Fri Mar 06</text>
  <rect x="180" y="50" width="720" height="510" fill="#0d0d0f"/>

  <!-- heading -->
  <text x="200" y="92" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#f0ede8">Tasks</text>

  <!-- filter pills -->
  <rect x="200" y="104" width="54" height="26" rx="13" fill="#c9a96e"/>
  <text x="227" y="121" font-family="monospace" font-size="11" fill="#0d0d0f" text-anchor="middle">All</text>
  <rect x="262" y="104" width="62" height="26" rx="13" fill="#1c1c1f" stroke="#2a2a2f" stroke-width="1"/>
  <text x="293" y="121" font-family="monospace" font-size="11" fill="#9b9893" text-anchor="middle">Active</text>
  <rect x="332" y="104" width="54" height="26" rx="13" fill="#1c1c1f" stroke="#2a2a2f" stroke-width="1"/>
  <text x="359" y="121" font-family="monospace" font-size="11" fill="#9b9893" text-anchor="middle">Done</text>

  <!-- add button -->
  <rect x="760" y="104" width="100" height="26" rx="8" fill="#e8d5a3"/>
  <text x="810" y="121" font-family="Georgia,serif" font-size="12" font-weight="bold" fill="#0d0d0f" text-anchor="middle">+ Add Task</text>

  <!-- task 1 (high) -->
  <rect x="200" y="146" width="660" height="58" rx="10" fill="#1c1c1f" stroke="#3a3a40" stroke-width="1"/>
  <rect x="214" y="163" width="20" height="20" rx="6" fill="none" stroke="#d97b7b" stroke-width="2"/>
  <text x="246" y="171" font-family="Georgia,serif" font-size="14" fill="#f0ede8">Review chapter 4 notes</text>
  <rect x="246" y="180" width="32" height="16" rx="8" fill="#d97b7b22"/>
  <text x="262" y="192" font-family="monospace" font-size="10" fill="#d97b7b" text-anchor="middle">High</text>
  <rect x="286" y="180" width="46" height="16" rx="8" fill="#b07bc422"/>
  <text x="309" y="192" font-family="monospace" font-size="10" fill="#b07bc4" text-anchor="middle">#study</text>

  <!-- task 2 (medium) -->
  <rect x="200" y="214" width="660" height="58" rx="10" fill="#1c1c1f" stroke="#3a3a40" stroke-width="1"/>
  <rect x="214" y="231" width="20" height="20" rx="6" fill="none" stroke="#e8d5a3" stroke-width="2"/>
  <text x="246" y="239" font-family="Georgia,serif" font-size="14" fill="#f0ede8">Submit project proposal</text>
  <rect x="246" y="248" width="32" height="16" rx="8" fill="#e8d5a322"/>
  <text x="262" y="260" font-family="monospace" font-size="10" fill="#e8d5a3" text-anchor="middle">Med</text>
  <text x="286" y="260" font-family="monospace" font-size="10" fill="#5a5855">Due Mar 15</text>
  <rect x="348" y="248" width="44" height="16" rx="8" fill="#b07bc422"/>
  <text x="370" y="260" font-family="monospace" font-size="10" fill="#b07bc4" text-anchor="middle">#work</text>

  <!-- task 3 (done) -->
  <rect x="200" y="282" width="660" height="58" rx="10" fill="#141416" stroke="#2a2a2f" stroke-width="1" opacity="0.7"/>
  <rect x="214" y="299" width="20" height="20" rx="6" fill="#7bc4a0" stroke="#7bc4a0" stroke-width="2"/>
  <!-- check -->
  <polyline points="219,309 223,313 230,305" fill="none" stroke="#0d0d0f" stroke-width="2" stroke-linecap="round"/>
  <text x="246" y="307" font-family="Georgia,serif" font-size="14" fill="#5a5855" text-decoration="line-through">Read 30 minutes</text>
  <rect x="246" y="316" width="28" height="16" rx="8" fill="#7badc422"/>
  <text x="260" y="328" font-family="monospace" font-size="10" fill="#7badc4" text-anchor="middle">Low</text>

  <!-- task 4 -->
  <rect x="200" y="350" width="660" height="58" rx="10" fill="#1c1c1f" stroke="#3a3a40" stroke-width="1"/>
  <rect x="214" y="367" width="20" height="20" rx="6" fill="none" stroke="#e8d5a3" stroke-width="2"/>
  <text x="246" y="375" font-family="Georgia,serif" font-size="14" fill="#f0ede8">Prepare weekly planner</text>
  <rect x="246" y="384" width="32" height="16" rx="8" fill="#e8d5a322"/>
  <text x="262" y="396" font-family="monospace" font-size="10" fill="#e8d5a3" text-anchor="middle">Med</text>

  <!-- counter -->
  <text x="860" y="430" font-family="monospace" font-size="11" fill="#5a5855" text-anchor="end">1/4 completed</text>

</svg>